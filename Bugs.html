<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bugs - Bug Reporting System</title>
  <link rel="stylesheet" href="navbar.css">
  <link rel="stylesheet" href="Bugs.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <img src="Images/WhatsApp Image 2026-04-18 at 17.04.15.jpeg" alt="Background Image" class="backgroundImage">
<nav class="navBar">
    <div class="navLeft">
        <div class="logo">
            <img src="Images/WhatsApp Image 2026-04-18 at 17.04.15.jpeg" alt="Logo">
        </div>
        <div class="companyName">
            <h1>BUG_HUNTER</h1>
        </div>
    </div>
    <div class="navRight">
        <a class="backButton" href="home.html">← Back</a>
    </div>
</nav>

  <div class="container mt-5">
  <div class="pageHeader">
    <div>
      <h2>Overview of all reported issues</h2>
      <div class="statsRow">
        <div class="totalIssues"><strong>Total:</strong> <span id="totalIssues">0</span></div>
        <div class="openIssues"><strong>Open:</strong> <span id="openIssues">0</span></div>
        <div class="resolvedIssues"><strong>Resolved:</strong> <span id="resolvedIssues">0</span></div>
        <div class="overdueIssues"><strong>Overdue:</strong> <span id="overdueIssues">0</span></div>
      </div>
    </div>
    <button type="button" class="viewAll" onclick="openAddBugModal()">+ Add New Bug</button>
  </div>

  <input id="searchBar" class="Search" placeholder="Search issues..." onkeyup="loadIssues()">

  <h4 id="issueCount"></h4>
  <div id="issuesList"></div>


  <div class="modal fade" id="addBugModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Add New Bug</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <form id="addBugForm">
            <div class="mb-2">
              <label for="bugSummary" class="form-label">Summary</label>
              <input type="text" class="form-control" id="bugSummary" required>
            </div>
            <div class="mb-2">
              <label for="bugDescription" class="form-label">Description</label>
              <textarea class="form-control" id="bugDescription" rows="3" required></textarea>
            </div>
            <div class="mb-2">
              <label for="bugProject" class="form-label">Project</label>
              <input type="text" class="form-control" id="bugProject" required>
            </div>
            <div class="mb-2">
              <label for="bugIdentifiedBy" class="form-label">Identified By</label>
              <input type="text" class="form-control" id="bugIdentifiedBy" required>
            </div>
            <div class="mb-2">
              <label for="bugPriority" class="form-label">Priority</label>
              <select class="form-control" id="bugPriority" required>
                <option>low</option>
                <option>medium</option>
                <option>high</option>
              </select>
            </div>
            <div class="mb-2">
              <label for="bugDateIdentified" class="form-label">Date Identified</label>
              <input type="date" class="form-control" id="bugDateIdentified" required>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="viewAll" onclick="saveBug()">Add Bug</button>
        </div>
      </div>
    </div>
  </div>

  </div>

  <script src="Bugs.js"></script>
  <script src="local storage.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
