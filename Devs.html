<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>People - Bug Reporting System</title>
  <link rel="stylesheet" href="navbar.css">
  <link rel="stylesheet" href="Dev.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <img src="Images/WhatsApp Image 2026-04-18 at 17.04.15.jpeg" alt="Background Image" class="backgroundImage">
<nav class="navBar">
    <div class="navLeft">
        <div class="logo">
            <img src="Images/WhatsApp Image 2026-04-18 at 17.04.15.jpeg" alt="Logo">
        </div>
        <div class="companyName">
            <h1>BUG_HUNTER</h1>
        </div>
    </div>
    <div class="navRight">
        <a class="backButton" href="home.html">← Back</a>
    </div>
</nav>

<div class="container mt-5">
  <h2>People</h2>
   <a class="viewAll" onclick="showAddDevModal()">Add Developer</a>
  <!-- People list container -->
  <div id="peopleList"></div>

  <!-- Person details modal -->
  <div class="modal fade" id="personModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Person Details</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body" id="personDetail"></div>
      </div>
    </div>
  </div>

  </div>
    <div class="modal fade" id="addDevModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Add New Developer</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <form id="addDevForm">
            <div class="mb-2">
              <label for="devName" class="form-label">Developer Name</label>
              <input type="text" class="form-control" id="devName" required>
            </div>
            <div class="mb-2">
              <label for="devSurname" class="form-label">Developer Surname</label>
              <input type="text" class="form-control" id="devSurname" required>
            </div>
            <div class="mb-2">
              <label for="devEmail" class="form-label">Developer Email</label>
              <input type="email" class="form-control" id="devEmail" required>
            </div>
            <div class="mb-2">
              <label for="devUsername" class="form-label">Developer Username</label>
              <input type="text" class="form-control" id="devUsername" required>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="viewAll" onclick="addDeveloper(document.getElementById('devName').value, document.getElementById('devSurname').value, document.getElementById('devEmail').value, document.getElementById('devUsername').value)">Add Developer</button>
        </div>
      </div>
    </div>
     </div>
  </div>
  <script src="local storage.js"></script>
  <script src="Devs.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
