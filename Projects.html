<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects - Bug Reporting System</title>
  <link rel="stylesheet" href="navbar.css">
  <link rel="stylesheet" href="Projects.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<img src="Images/WhatsApp Image 2026-04-18 at 17.04.15.jpeg" alt="Background Image" class="backgroundImage">
<nav class="navBar">
    <div class="navLeft">
        <div class="logo">
            <img src="Images/WhatsApp Image 2026-04-18 at 17.04.15.jpeg" alt="Logo">
        </div>
        <div class="companyName">
            <h1>BUG_HUNTER</h1>
        </div>
    </div>
    <div class="navRight">
        <a class="backButton" href="home.html">← Back</a>
    </div>
</nav>
     <div class="modal fade" id="addProjectModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Add New Project</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <form id="addProjectForm">
            <div class="mb-2">
              <label for="projectName" class="form-label">Project Name</label>
              <input type="text" class="form-control" id="projectName" required>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="viewAll" onclick="addProject(document.getElementById('projectName').value)">Add Project</button>
        </div>
      </div>
    </div>
     </div>
  </div>
<div class="container mt-5">

  <h2>Projects</h2>
   <a class="viewAll" onclick="showAddProjectModal()">Add Project</a>
  <div id="projectsList"></div>

  <div class="modal fade" id="projectModal" tabindex="-1">
     <div class="modal-dialog">
         <div class="modal-content">
              <div class="modal-header">
                  <h5 class="modal-title">Project Details</h5>
                  <button title="button" type="button" class="btn-close" data-bs-dismiss="modal"></button>
               </div>
               
               <div 
                  class="modal-body" id="projectDetail">
               </div>
         </div>
      </div>
  </div>



  <script src="local storage.js"></script>
  <script src="Projects.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
