<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BUG_HUNTER</title>
    <link rel="stylesheet" href="navbar.css">
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navBar">
        <div class="navLeft">
            <div class="logo">
                <img src="Images/WhatsApp Image 2026-04-18 at 17.04.15.jpeg" alt="Logo">
            </div>
            <div class="companyName">
                <h1>BUG_HUNTER</h1>
            </div>
        </div>
    </nav>

    <div class="loginContainer">
        <div class="loginContent">
            <form class="loginForm" id="loginForm">
                <h1 class="loginTitle">Sign in</h1>
                
                <input type="text" id="username" placeholder="Please enter your username" required>
                
                <div class="passwordGroup">
                    <input type="password" id="password" placeholder="Please enter your password" required>
                    <button class="togglePasswordBtn" type="button" id="togglePassword">Show</button>
                </div>

                <p id="errorBox" class="errorMessage" style="display: none;">Invalid credentials. Please try again.</p>

                <button type="submit" class="loginBtn">Enter</button>
            </form>
        </div>
    </div>
    
    <script src="local storage.js"></script>
    <script src="login.js"></script>
    <script src="index.js"></script>
</body>
</html>
